apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus
    editable: true

  # Traces backend for the RAG pipeline waterfall. Point `url` at your Tempo
  # (default OTLP/HTTP collector on :3200). The backend must run with
  # OTEL_ENABLED=true and OTEL_EXPORTER_OTLP_ENDPOINT pointing at the collector.
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    editable: true
    jsonData:
      # Service map + span-rate/error/duration panels come from the Prometheus
      # metrics generated by Tempo's metrics-generator (optional).
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      # Jump from a span to the matching RAG stage latency metric.
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
