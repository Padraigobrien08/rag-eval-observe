name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Install ruff
        run: uv tool install ruff

      - name: Run ruff check and auto-fix
        run: ruff check --fix --unsafe-fixes .

      - name: Run ruff check (verify)
        run: ruff check . || (echo "Some ruff errors remain. Run 'ruff check --fix --unsafe-fixes .' locally and commit the fixes." && exit 1)

      - name: Run ruff format
        run: ruff format .

      - name: Run ruff format check
        run: ruff format --check . || (echo "Files were reformatted. Run 'ruff format .' locally and commit the changes." && exit 1)

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Install mypy
        run: uv add --dev mypy

      - name: Run mypy
        run: uv run mypy app/ --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      OPENAI_API_KEY: test-key-not-used
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4-turbo-preview
      EMBEDDING_DIMENSION: 1536

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run migrations
        run: |
          # Wait for postgres to be ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done
          # Run migrations if migration script exists
          if [ -f "src/lib/db/migrate.ts" ]; then
            echo "Running migrations..."
          fi

      - name: Run tests
        run: uv run pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

