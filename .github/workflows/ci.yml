name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (Jest)
        run: pnpm exec jest --ci --coverage

      - name: Upload frontend coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: coverage/coverage-summary.json
          if-no-files-found: error

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm exec playwright test
        env:
          CI: true

  lint-and-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check app tests migrations scripts eval

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Mypy (app)
        run: uv run mypy app

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      OPENAI_API_KEY: test-key-not-used
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4o-mini
      EMBEDDING_DIMENSION: 1536

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Apply database schema
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done
          uv run python scripts/apply_init_sql.py
          uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage.xml
          if-no-files-found: error

  # Self-hosted coverage badge — no external service. Combines frontend + backend
  # line coverage into a shields.io endpoint JSON and publishes it to the orphan
  # `badges` branch (read by the README badge). Runs only on push to main; the
  # `badges` branch is not a CI trigger, so this never loops.
  coverage-badge:
    runs-on: ubuntu-latest
    needs: [frontend, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-frontend
          path: cov/frontend

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-backend
          path: cov/backend

      - name: Compute badge JSON
        run: node scripts/coverage-badge.mjs cov/frontend/coverage-summary.json cov/backend/coverage.xml > coverage.json

      - name: Publish to badges branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmp=$(mktemp -d)
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git clone --depth 1 --branch badges "$remote" "$tmp" 2>/dev/null; then
            cd "$tmp"
          else
            git clone --depth 1 "$remote" "$tmp"
            cd "$tmp"
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp "$GITHUB_WORKSPACE/coverage.json" coverage.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          if git diff --cached --quiet; then
            echo "coverage badge unchanged"
          else
            git commit -m "chore: update coverage badge [skip ci]"
            git push origin HEAD:badges
          fi
