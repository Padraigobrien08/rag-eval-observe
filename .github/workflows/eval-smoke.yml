# Cheap eval run: small case count. Weekly + manual.
name: Eval smoke

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  eval-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: evaldb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/evaldb
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4o-mini
      EMBEDDING_DIMENSION: 1536
      EVAL_USE_LLM_JUDGE: 'false'
      EVAL_MAX_CASES: '5'
      # Persist eval turns into chat_messages (requires Alembic chat schema above).
      EVAL_RECORD_CHAT: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Require OpenAI API key (scheduled runs)
        if: github.event_name == 'schedule'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::Scheduled eval-smoke needs the OPENAI_API_KEY repository secret. Add it under Settings → Secrets, or disable the schedule in eval-smoke.yml."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Wait for Postgres and apply schema
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done
          uv run python scripts/apply_init_sql.py
          uv run alembic upgrade head

      - name: Seed eval corpus
        run: uv run python scripts/seed_eval_corpus.py

      - name: Run evaluation (subset)
        run: uv run python eval/run_eval.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: eval-smoke-report
          path: backend/eval/report.md

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -fsS -X POST -H 'Content-type: application/json' \
              --data '{"text":"RAG eval-smoke workflow failed — see GitHub Actions."}' \
              "$SLACK_WEBHOOK_URL"
          fi
