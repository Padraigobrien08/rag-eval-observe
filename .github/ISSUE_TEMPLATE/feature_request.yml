name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The motivation — the workflow or gap this addresses. Not the solution yet.
      placeholder: When comparing eval runs I can't … so I have to …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Rough is fine.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (FastAPI / RAG pipeline)
        - Frontend (Next.js web app)
        - Evaluation harness / CI eval gate
        - Observability (tracing / metrics)
        - Deployment / Docker
        - Docs
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or prior art you looked at.
